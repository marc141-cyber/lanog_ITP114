<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<body style="background-color: #e9ecef;">
    <header >
        <ul class="main-nav">
            <li><a href="index.html">My Portfolio</a></li>
            <li><a href="index.html"><img src="logo.jpg"></a></li>
            <li><a href="index.html">Home Page</a></li>

            <li><a href="contact.html">Contact</a></li>
            <li><a href="p-file.html">Profile</a></li>
        </ul>
    </header>


    <div class="container py-5">

        

       <div class="row justify-content-center">

            <div class="mb-4 text-center">
                <h2>Contact</h2>
                <p>Feel free to reach out anytime. I’m open to new ideas, opportunities—let’s connect!</p>
            </div>
            <div class="col-md-2 col-lg-5">
                <div class="card p-4 shadow-sm">
                    <form>
                        <input type="text" class="form-control mb-3" placeholder="Full Name" required>

                        <div class="row">
                            <div class="col">
                                <input type="email" class="form-control mb-3" placeholder="Email" required>
                            </div>
                            <div class="col">
                                <input type="text" class="form-control mb-3" placeholder="Phone Number">
                            </div>
                        </div>

                        <input type="text" class="form-control mb-3" placeholder="Subject" required>
                        <textarea class="form-control mb-3" rows="5" placeholder="Message" required></textarea>

                        <button class="btn btn-primary w-100">Send Message</button>
                    </form>
                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
